# Railway: use Nixpacks, not Docker. Required after removing the root Dockerfile —
# otherwise the service may keep "Dockerfile" as the builder and fail with "Build image".
# See https://docs.railway.com/config-as-code
#
# Config-as-code overrides dashboard settings for new deploys.

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python main.py --transport http --host 0.0.0.0"
